<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}University Course Directory{% endblock %}</title>
  <style>
    body {
      margin: 0;
      color: #1f2933;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #f6f8fa;
    }

    header {
      background: #223041;
      color: white;
      padding: 18px 32px;
    }

    nav {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }

    nav a {
      color: white;
    }

    main {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 20px;
    }

    a {
      color: #0f5e9c;
    }

    .list {
      display: grid;
      gap: 16px;
    }

    .item {
      background: white;
      border: 1px solid #d8dee4;
      border-radius: 6px;
      padding: 18px;
    }

    .muted {
      color: #586069;
    }
  </style>
</head>
<body>
  <header>
    <strong>University Course Directory</strong>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'department_list' %}">Departments</a>
      <a href="{% url 'course_list' %}">Courses</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
